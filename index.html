<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1D4ED8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LumaPack">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>LumaPack 🧳</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#F7F6F2}
body{font-family:-apple-system,'SF Pro Text',Helvetica Neue,sans-serif}
input,button,textarea{font-family:inherit}
button{cursor:pointer}

#app{height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:#F7F6F2}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{display:none}

/* LOADING */
.loading{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#6B7280;font-size:15px;text-align:center;padding:0 24px}
.spinner{width:32px;height:32px;border:3px solid #E8E5DF;border-top-color:#1D4ED8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{flex-shrink:0;background:#fff;border-top:1px solid #E8E5DF;display:flex;align-items:center;justify-content:space-around;padding:10px 24px 28px}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:#B0AAA5;padding:6px 0}
.nav-btn.active{color:#1D4ED8}
.nav-icon{font-size:22px;line-height:1}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.06em}
.nav-plus{background:#1D4ED8;border:none;border-radius:20px;width:56px;height:56px;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 20px rgba(29,78,216,.38)}

/* HOME */
.home-header{padding:52px 20px 24px}
.home-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#B0AAA5}
.home-title{font-size:26px;font-weight:800;color:#1A1614;letter-spacing:-.03em;margin-top:8px}
.home-list{padding:0 20px 20px;display:flex;flex-direction:column;gap:10px}
.empty-state{text-align:center;padding:52px 20px 32px}
.empty-icon{font-size:64px;line-height:1;margin-bottom:14px}
.empty-text{color:#6B7280;font-size:15px;line-height:1.7}
.trip-card{background:#fff;border-radius:18px;padding:16px 18px;border:1.5px solid #E8E5DF;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .4s}
.trip-card.complete{border-color:#A7F3D0}
.trip-emoji{font-size:30px;line-height:1;flex-shrink:0}
.trip-info{flex:1;min-width:0}
.trip-name{font-weight:700;font-size:15px;color:#1A1614;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.trip-date-lbl{font-size:11px;color:#B0AAA5;margin-bottom:8px}
.trip-bar-track{height:5px;border-radius:5px;background:#E8E5DF;overflow:hidden}
.trip-bar-fill{height:100%;border-radius:5px;background:#1D4ED8;transition:width .45s ease,background .3s}
.trip-bar-fill.done{background:#059669}
.trip-stats{font-size:11px;color:#B0AAA5;margin-top:5px;font-weight:500}
.trip-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.trip-icon-btn{background:none;border:none;color:#B0AAA5;padding:4px;font-size:16px;line-height:1;text-align:center}

/* TRIP HEADER */
.trip-hdr{background:#fff;border-bottom:1px solid #E8E5DF;padding:48px 20px 16px;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;color:#1D4ED8;font-size:15px;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:5px}
.trip-hdr-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.trip-hdr-left{flex:1;min-width:0}
.trip-hdr-emoji{font-size:24px;line-height:1;margin-bottom:3px}
.trip-hdr-name-wrap{display:flex;align-items:center;gap:8px}
.trip-hdr-name{font-size:19px;font-weight:800;color:#1A1614;letter-spacing:-.02em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trip-hdr-name-inp{font-size:19px;font-weight:800;color:#1A1614;letter-spacing:-.02em;border:none;border-bottom:2px solid #1D4ED8;outline:none;background:transparent;flex:1;min-width:0;padding:2px 0}
.trip-hdr-preset{font-size:11px;color:#B0AAA5;margin-top:2px}
.edit-name-btn{background:none;border:none;color:#B0AAA5;font-size:14px;flex-shrink:0;padding:2px}

/* CATEGORIES */
.cats-wrap{padding:18px 20px 80px}
.cat-section{margin-bottom:14px}
.cat-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:5px 2px;background:none;border:none;font-family:inherit}
.cat-lbl{display:flex;align-items:center;gap:7px}
.cat-chev{font-size:11px;color:#B0AAA5;transition:transform .2s;display:inline-block}
.cat-chev.open{transform:rotate(90deg)}
.cat-name-txt{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#6B7280}
.cat-count{font-size:12px;font-weight:600;color:#B0AAA5}
.cat-count.done{color:#059669}
.items-card{background:#fff;border-radius:14px;border:1px solid #E8E5DF;overflow:hidden;margin-top:6px}

/* ITEM ROW */
.item-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #E8E5DF;cursor:pointer;transition:opacity .35s ease}
.item-row.checked{opacity:.42}
.chkbox{width:22px;height:22px;border-radius:7px;flex-shrink:0;border:2px solid #D1CEC8;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s ease;pointer-events:none}
.item-row.checked .chkbox{background:#1D4ED8;border-color:#1D4ED8}
.item-name{flex:1;font-size:15px;color:#1A1614;pointer-events:none}
.item-row.checked .item-name{text-decoration:line-through;text-decoration-color:#6B7280;color:#6B7280}
.item-del{background:none;border:none;color:#D1CEC8;padding:2px 6px;font-size:18px;line-height:1;flex-shrink:0}
.item-del:active{color:#DC2626}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:10px;padding:10px 16px}
.add-ph{width:22px;height:22px;border-radius:7px;border:2px dashed #E8E5DF;flex-shrink:0}
.add-inp{flex:1;border:none;outline:none;font-size:14px;color:#6B7280;background:transparent;font-family:inherit}
.add-inp::placeholder{color:#B0AAA5}
.add-go{background:#1D4ED8;color:#fff;border:none;border-radius:6px;width:26px;height:26px;align-items:center;justify-content:center;font-size:18px;display:none;flex-shrink:0}
.add-go.vis{display:flex}

/* MODALS & SHEETS */
.modal-bg{position:absolute;inset:0;background:rgba(10,8,5,.52);display:flex;align-items:flex-end;z-index:100}
.modal-sheet{width:100%;background:#fff;border-radius:22px 22px 0 0;padding:20px 22px 40px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;background:#E8E5DF;margin:0 auto 20px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-size:20px;font-weight:800;color:#1A1614}
.modal-close{background:#F7F6F2;border:none;width:32px;height:32px;border-radius:8px;font-size:20px;color:#6B7280;display:flex;align-items:center;justify-content:center}
.field-lbl{display:block;font-size:11px;font-weight:700;color:#B0AAA5;letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px}
.field-inp{width:100%;padding:13px 14px;border-radius:12px;font-size:15px;color:#1A1614;background:#F7F6F2;outline:none;border:1.5px solid #E8E5DF;margin-bottom:18px;font-family:inherit;transition:border-color .2s}
.field-inp:focus{border-color:#1D4ED8}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.preset-card{padding:14px 12px;border-radius:13px;text-align:left;border:2px solid #E8E5DF;background:#fff;transition:all .15s;font-family:inherit}
.preset-card.sel{border-color:#1D4ED8;background:#EFF6FF}
.p-card-em{font-size:22px;line-height:1;margin-bottom:6px}
.p-card-nm{font-size:12px;font-weight:700;color:#1A1614;line-height:1.4}
.confirm-btn{width:100%;padding:15px;border-radius:14px;background:#D1CEC8;color:#fff;border:none;font-size:16px;font-weight:700;font-family:inherit;transition:background .2s;cursor:default}
.confirm-btn.rdy{background:#1D4ED8;cursor:pointer}

/* CONFIRM DIALOG (update preset) */
.dialog-bg{position:absolute;inset:0;background:rgba(10,8,5,.52);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.dialog-box{background:#fff;border-radius:20px;padding:24px;width:100%}
.dialog-title{font-size:17px;font-weight:800;color:#1A1614;margin-bottom:8px}
.dialog-body{font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:22px}
.dialog-actions{display:flex;flex-direction:column;gap:10px}
.dialog-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.dialog-btn.primary{background:#1D4ED8;color:#fff}
.dialog-btn.secondary{background:#F7F6F2;color:#1A1614}
.dialog-btn.danger{background:#FEF2F2;color:#DC2626}

/* PRESETS VIEW */
.vw-hdr{padding:48px 20px 24px}
.view-back{background:none;border:none;color:#1D4ED8;font-size:15px;padding:0;margin-bottom:20px;display:flex;align-items:center;gap:5px;font-family:inherit}
.view-title{font-size:24px;font-weight:800;color:#1A1614;letter-spacing:-.02em}
.presets-list{padding:0 20px 80px;display:flex;flex-direction:column;gap:10px}
.p-list-card{background:#fff;border-radius:16px;padding:16px 18px;border:1px solid #E8E5DF;display:flex;align-items:center;gap:14px}
.p-list-em{font-size:26px;line-height:1}
.p-list-info{flex:1}
.p-list-name{font-weight:700;font-size:15px;color:#1A1614}
.p-list-meta{font-size:12px;color:#B0AAA5;margin-top:2px}
.edit-btn{background:#EFF6FF;color:#1D4ED8;border:none;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;font-family:inherit}

/* EDIT PRESET */
.ep-wrap{padding:0 20px 80px}
.ep-name-row{display:flex;gap:8px;margin-bottom:20px;align-items:center}
.ep-name-lbl{font-size:11px;font-weight:700;color:#B0AAA5;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap}
.ep-name-inp{flex:1;padding:10px 13px;border-radius:10px;border:1.5px solid #E8E5DF;font-size:15px;font-weight:700;color:#1A1614;background:#F7F6F2;outline:none;font-family:inherit}
.ep-name-inp:focus{border-color:#1D4ED8}
.ep-cat-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #E8E5DF}
.ep-cat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ep-cat-lbl{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.09em}
.ep-del-cat{background:none;border:none;color:#DC2626;font-size:12px;font-weight:600;font-family:inherit}
.ep-item-row{display:flex;gap:8px;margin-bottom:8px}
.ep-item-inp{flex:1;padding:9px 12px;border-radius:9px;border:1px solid #E8E5DF;font-size:14px;color:#1A1614;background:#F7F6F2;outline:none;font-family:inherit}
.ep-item-inp:focus{border-color:#1D4ED8}
.ep-del-item{background:none;border:none;color:#B0AAA5;font-size:18px;line-height:1}
.ep-add-item{background:none;border:none;color:#1D4ED8;font-size:13px;font-weight:600;font-family:inherit;padding:4px 0;display:flex;align-items:center;gap:4px}
.new-cat-row{display:flex;gap:8px;margin-bottom:24px}
.new-cat-inp{flex:1;padding:11px 14px;border-radius:10px;border:1.5px dashed #D1CEC8;font-size:14px;color:#1A1614;background:#fff;outline:none;font-family:inherit}
.new-cat-inp:focus{border-color:#1D4ED8}
.new-cat-btn{background:#1D4ED8;color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:20px}
.save-btn{width:100%;padding:15px;border-radius:14px;background:#059669;color:#fff;border:none;font-size:16px;font-weight:700;font-family:inherit}

/* INLINE NAME EDITING */
.editing-name .trip-hdr-name{display:none}
.editing-name .trip-hdr-name-inp{display:block}
.trip-hdr-name-inp{display:none}
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div><p id="status-msg">Avvio...</p></div>
</div>

<script>
// ═══════════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAaz6-ss9OUYpUmQghCzKJubXGlY7TYMRM",
  authDomain:        "lumapack-d9d57.firebaseapp.com",
  databaseURL:       "https://lumapack-d9d57-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "lumapack-d9d57",
  storageBucket:     "lumapack-d9d57.firebasestorage.app",
  messagingSenderId: "737924294798",
  appId:             "1:737924294798:web:aa87150046848e36f141df"
};

// ═══════════════════════════════════════════
// DEFAULT PRESETS
// ═══════════════════════════════════════════
const DEFAULT_PRESETS = [
  { id:'mare', name:'Mare (3 gg)', emoji:'🏖️', categories:[
    { name:'Abbigliamento', items:['T-shirt','Costumi','Infradito'] },
    { name:'Cura & Sole',   items:['Crema solare 50+','Doposole'] },
    { name:'Tech',          items:['Powerbank'] },
    { name:'Spiaggia',      items:['Telo mare'] }
  ]},
  { id:'montagna', name:'Montagna / Trek', emoji:'⛰️', categories:[
    { name:'Abbigliamento', items:['Maglie termiche','Pile / Guscio','Scarponcini'] },
    { name:'Attrezzatura',  items:['Zaino 30L','Borraccia','Kit vesciche'] }
  ]},
  { id:'lavoro', name:'Lavoro (1–2 notti)', emoji:'💼', categories:[
    { name:'Abbigliamento', items:['Camicie no-stiro','Scarpe formali'] },
    { name:'Tech',          items:['Laptop e cavi'] },
    { name:'Igiene',        items:['Beauty case (liquidi <100ml)'] },
    { name:'Documenti',     items:['Badge aziendale'] }
  ]},
  { id:'lowcost', name:'Volo Low-Cost', emoji:'✈️', categories:[
    { name:'Documenti',    items:['Passaporto',"Carta d'imbarco"] },
    { name:'Carry-on',     items:['Bustina liquidi 20×20'] },
    { name:'Comfort',      items:['Kindle / Libro','Tappi per orecchie'] },
    { name:'Attenzione ⚠', items:['No oggetti taglienti'] }
  ]}
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S = {
  uid: null,
  trips: {},
  presets: {},
  view: 'loading',   // loading | home | trip | presets | editPreset
  tripId: null,
  editPresetId: null,
  showModal: false,   // 'new' | 'updatePreset' | false
  selPresetId: '',
  collapsed: {},
  editState: null,    // { name, cats }
  editingTripName: false,
  tripItemsSnapshot: null, // snapshot of item names when entering a trip
};

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dbr   = p => firebase.database().ref(`users/${S.uid}${p ? '/'+p : ''}`);
const toArr = v => !v ? [] : (Array.isArray(v) ? v : Object.values(v));

function parsePresets(val) {
  const out = {};
  Object.entries(val).forEach(([id,p]) => {
    out[id] = { id, name:p.name, emoji:p.emoji,
      categories: toArr(p.categories).map(c => ({ name:c.name, items:toArr(c.items||[]) }))
    };
  });
  return out;
}

function parseTrips(val) {
  const out = {};
  Object.entries(val||{}).forEach(([id,t]) => {
    out[id] = { id, name:t.name, presetId:t.presetId, presetName:t.presetName,
      emoji:t.emoji, createdAt:t.createdAt||0, departDate:t.departDate||'', items:t.items||{}
    };
  });
  return out;
}

function tripProgress(trip) {
  const items = Object.values(trip.items||{});
  const done = items.filter(i=>i.checked).length;
  const total = items.length;
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

// Snapshot of current item names grouped by category (to detect changes)
function itemSnapshot(trip) {
  const items = Object.values(trip.items||{});
  const cats = {};
  items.forEach(i => {
    if (!cats[i.category]) cats[i.category] = [];
    cats[i.category].push(i.name);
  });
  Object.values(cats).forEach(arr => arr.sort());
  return JSON.stringify(cats);
}

function presetSnapshot(presetId) {
  const p = S.presets[presetId];
  if (!p) return '';
  const cats = {};
  p.categories.forEach(c => { cats[c.name] = [...c.items].sort(); });
  return JSON.stringify(cats);
}

// ═══════════════════════════════════════════
// FIREBASE INIT
// ═══════════════════════════════════════════
function showError(msg) {
  document.getElementById('app').innerHTML =
    `<div class="loading"><p style="color:#DC2626;line-height:1.6">${msg}</p></div>`;
}
function setStatus(msg) {
  const el = document.getElementById('status-msg');
  if (el) el.innerHTML = msg;
}

async function init() {
  setStatus('Avvio...');
  try { firebase.initializeApp(FIREBASE_CONFIG); }
  catch(e) { if (!e.code?.includes('duplicate-app')) { showError('Errore Firebase: '+e.message); return; } }

  const T = (p,ms,lbl) => Promise.race([p, new Promise((_,r)=>setTimeout(()=>r(new Error('Timeout: '+lbl)),ms))]);

  setStatus('Connessione...');
  let user;
  try {
    const res = await T(firebase.auth().signInAnonymously(), 9000, 'auth');
    user = res.user;
  } catch(e) { showError('Errore Auth:<br><small>'+e.message+'</small>'); return; }

  S.uid = user.uid;
  setStatus('Carico dati...');
  let val;
  try {
    const snap = await T(dbr().once('value'), 9000, 'db');
    val = snap.val() || {};
  } catch(e) { showError('Errore DB:<br><small>'+e.message+'</small>'); return; }

  S.presets = val.presets ? parsePresets(val.presets) : {};
  if (!val.presets) await seedPresets();
  S.trips = val.trips ? parseTrips(val.trips) : {};
  S.view = 'home';
  S.selPresetId = Object.keys(S.presets)[0] || '';
  render();
}

async function seedPresets() {
  const obj = {};
  DEFAULT_PRESETS.forEach(p => { obj[p.id] = { name:p.name, emoji:p.emoji, categories:p.categories }; });
  await dbr('presets').set(obj);
  DEFAULT_PRESETS.forEach(p => { S.presets[p.id] = JSON.parse(JSON.stringify(p)); });
}

// ═══════════════════════════════════════════
// TRIP ACTIONS
// ═══════════════════════════════════════════
function createTrip(name, presetId, departDate) {
  const preset = S.presets[presetId];
  if (!preset) return;
  const id = genId();
  const items = {};
  preset.categories.forEach(cat => {
    cat.items.forEach(itemName => {
      const iid = genId();
      items[iid] = { id:iid, name:itemName, category:cat.name, checked:false, checkedAt:null };
    });
  });
  const trip = { id, name, presetId, presetName:preset.name, emoji:preset.emoji,
    createdAt:Date.now(), departDate:departDate||'', items };
  S.trips[id] = trip;
  dbr(`trips/${id}`).set(trip);
  S.tripId = id;
  S.tripItemsSnapshot = itemSnapshot(trip);
  S.view = 'trip';
  S.showModal = false;
  render();
}

function duplicateTrip(tripId) {
  const src = S.trips[tripId];
  if (!src) return;
  const id = genId();
  const items = {};
  Object.values(src.items).forEach(it => {
    const iid = genId();
    items[iid] = { ...it, id:iid, checked:false, checkedAt:null };
  });
  const trip = { ...src, id, name: src.name+' (copia)', createdAt:Date.now(), items };
  S.trips[id] = trip;
  dbr(`trips/${id}`).set(trip);
  render();
}

function toggleItem(tripId, itemId) {
  const trip = S.trips[tripId];
  const item = trip?.items[itemId];
  if (!item) return;
  const newVal = !item.checked;

  // Animate immediately
  const row = document.querySelector(`[data-iid="${itemId}"]`);
  if (row) {
    row.classList.toggle('checked', newVal);
    const cb = row.querySelector('.chkbox');
    if (cb) { cb.style.background=newVal?'#1D4ED8':''; cb.style.borderColor=newVal?'#1D4ED8':'#D1CEC8'; cb.innerHTML=newVal?checkSVG():''; }
    const nm = row.querySelector('.item-name');
    if (nm) nm.style.textDecoration = newVal ? 'line-through' : 'none';
  }

  item.checked = newVal;
  item.checkedAt = newVal ? Date.now() : null;
  dbr(`trips/${tripId}/items/${itemId}`).update({ checked:newVal, checkedAt:item.checkedAt });
  updateRing(tripId);
  setTimeout(() => refreshCats(tripId), 460);
}

function addItem(tripId, category, name) {
  const id = genId();
  const item = { id, name, category, checked:false, checkedAt:null };
  S.trips[tripId].items[id] = item;
  dbr(`trips/${tripId}/items/${id}`).set(item);
  refreshCats(tripId);
}

function deleteItem(tripId, itemId) {
  delete S.trips[tripId].items[itemId];
  dbr(`trips/${tripId}/items/${itemId}`).remove();
  refreshCats(tripId);
  updateRing(tripId);
}

function deleteTrip(tripId) {
  if (!confirm('Eliminare questo viaggio?')) return;
  delete S.trips[tripId];
  dbr(`trips/${tripId}`).remove();
  if (S.tripId === tripId) { S.tripId = null; S.view = 'home'; }
  render();
}

function saveTripName(tripId, newName) {
  newName = newName.trim();
  if (!newName) return;
  S.trips[tripId].name = newName;
  dbr(`trips/${tripId}/name`).set(newName);
  S.editingTripName = false;
  // Just update the header DOM without full re-render
  const wrap = document.getElementById('trip-name-wrap');
  if (wrap) {
    wrap.classList.remove('editing-name');
    const nm = wrap.querySelector('.trip-hdr-name');
    if (nm) nm.textContent = newName;
  }
}

// ═══════════════════════════════════════════
// GO BACK FROM TRIP — check if preset needs update
// ═══════════════════════════════════════════
function goHome() {
  if (S.view === 'trip' && S.tripId) {
    const trip = S.trips[S.tripId];
    if (trip) {
      const currentSnap = itemSnapshot(trip);
      const presetSnap  = presetSnapshot(trip.presetId);
      // Only offer update if something changed vs the preset
      if (S.tripItemsSnapshot !== null && currentSnap !== presetSnap) {
        S.showModal = 'updatePreset';
        render();
        return;
      }
    }
  }
  S.view = 'home'; S.tripId = null; S.tripItemsSnapshot = null; render();
}

function applyPresetUpdate() {
  const trip = S.trips[S.tripId];
  if (!trip) { finalizeGoHome(); return; }
  const preset = S.presets[trip.presetId];
  if (!preset) { finalizeGoHome(); return; }

  // Rebuild categories from current trip items
  const allItems = Object.values(trip.items);
  const catOrder = [...new Set(allItems.map(i=>i.category))];
  const newCats = catOrder.map(catName => ({
    name: catName,
    items: allItems.filter(i=>i.category===catName).map(i=>i.name)
  }));

  preset.categories = newCats;
  dbr(`presets/${preset.id}/categories`).set(newCats);
  finalizeGoHome();
}

function finalizeGoHome() {
  S.showModal = false;
  S.view = 'home';
  S.tripId = null;
  S.tripItemsSnapshot = null;
  render();
}

// ═══════════════════════════════════════════
// PRESET ACTIONS
// ═══════════════════════════════════════════
function enterEditPreset(presetId) {
  S.editPresetId = presetId;
  S.view = 'editPreset';
  const p = S.presets[presetId];
  S.editState = { name: p.name, cats: JSON.parse(JSON.stringify(p.categories)) };
  render();
}

function collectEditInputs() {
  // Collect name
  const nameInp = document.getElementById('ep-name-inp');
  if (nameInp) S.editState.name = nameInp.value;
  // Collect items
  document.querySelectorAll('.ep-cat-card').forEach((card, ci) => {
    if (!S.editState.cats[ci]) return;
    S.editState.cats[ci].items = [...card.querySelectorAll('.ep-item-inp')].map(i=>i.value.trim()).filter(Boolean);
  });
}

function addEditItem(ci) {
  collectEditInputs();
  S.editState.cats[ci].items.push('');
  renderEditBody();
  // Focus the new input
  const cards = document.querySelectorAll(`[data-ci="${ci}"] .ep-item-inp`);
  const last = cards[cards.length-1];
  if (last) { last.focus(); last.select(); }
}

function removeEditItem(ci, ii) {
  collectEditInputs();
  S.editState.cats[ci].items.splice(ii, 1);
  renderEditBody();
}

function addEditCat() {
  const inp = document.getElementById('new-cat-inp');
  const name = inp?.value.trim();
  if (!name) return;
  collectEditInputs();
  S.editState.cats.push({ name, items:[] });
  inp.value = '';
  renderEditBody();
}

function removeEditCat(ci) {
  collectEditInputs();
  S.editState.cats.splice(ci, 1);
  renderEditBody();
}

function savePreset() {
  collectEditInputs();
  const cats = S.editState.cats.filter(c=>c.name.trim());
  const newName = S.editState.name.trim() || S.presets[S.editPresetId].name;
  S.presets[S.editPresetId].categories = cats;
  S.presets[S.editPresetId].name = newName;
  dbr(`presets/${S.editPresetId}`).update({ categories:cats, name:newName });
  S.view = 'presets'; S.editState = null; render();
}

// ═══════════════════════════════════════════
// RING SVG
// ═══════════════════════════════════════════
const checkSVG = () =>
  `<svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3 3 7-7" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function ringHTML(pct) {
  const r=31,cx=39,cy=39,circ=2*Math.PI*r,arc=(pct/100)*circ;
  const col = pct===100?'#059669':'#1D4ED8';
  return `<svg id="progress-ring" width="78" height="78" viewBox="0 0 78 78">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E8E5DF" stroke-width="5.5"/>
    <circle class="ring-arc" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="5.5"
      stroke-dasharray="${arc.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .5s ease,stroke .3s"/>
    <text class="ring-txt" x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
      font-size="${pct===100?18:15}" font-weight="700" fill="${col}" font-family="-apple-system,sans-serif">
      ${pct===100?'✓':pct+'%'}
    </text>
  </svg>`;
}

function updateRing(tripId) {
  const arc = document.querySelector('#progress-ring .ring-arc');
  const txt = document.querySelector('#progress-ring .ring-txt');
  if (!arc) return;
  const {pct} = tripProgress(S.trips[tripId]);
  const circ = 2*Math.PI*31;
  const col = pct===100?'#059669':'#1D4ED8';
  arc.setAttribute('stroke-dasharray',`${((pct/100)*circ).toFixed(1)} ${circ.toFixed(1)}`);
  arc.setAttribute('stroke',col);
  if (txt) { txt.textContent=pct===100?'✓':pct+'%'; txt.setAttribute('fill',col); txt.setAttribute('font-size',pct===100?'18':'15'); }
}

// ═══════════════════════════════════════════
// CATEGORIES RENDER
// ═══════════════════════════════════════════
function catsHTML(tripId) {
  const trip = S.trips[tripId];
  if (!trip) return '';
  const allItems = Object.values(trip.items||{});
  const cats = [...new Set(allItems.map(i=>i.category))];

  return cats.map(catName => {
    const items = allItems.filter(i=>i.category===catName);
    const sorted = [...items].sort((a,b)=>{
      if (a.checked!==b.checked) return a.checked?1:-1;
      return (a.checkedAt||0)-(b.checkedAt||0);
    });
    const done = items.filter(i=>i.checked).length;
    const isOpen = !S.collapsed[catName];
    const allDone = done===items.length && items.length>0;

    return `<div class="cat-section">
      <button class="cat-hdr" data-a="toggle-cat" data-cat="${esc(catName)}">
        <span class="cat-lbl">
          <span class="cat-chev${isOpen?' open':''}">▶</span>
          <span class="cat-name-txt">${esc(catName)}</span>
        </span>
        <span class="cat-count${allDone?' done':''}">${done}/${items.length}</span>
      </button>
      ${isOpen ? `<div class="items-card">
        ${sorted.map(item=>`
          <div class="item-row${item.checked?' checked':''}" data-a="toggle-item" data-iid="${esc(item.id)}" data-tid="${esc(tripId)}">
            <div class="chkbox" style="${item.checked?'background:#1D4ED8;border-color:#1D4ED8':''}">
              ${item.checked?checkSVG():''}
            </div>
            <span class="item-name" style="${item.checked?'text-decoration:line-through':''}">${esc(item.name)}</span>
            <button class="item-del" data-a="del-item" data-iid="${esc(item.id)}" data-tid="${esc(tripId)}">×</button>
          </div>`).join('')}
        <div class="add-row">
          <div class="add-ph"></div>
          <input class="add-inp" type="text" inputmode="text" enterkeyhint="done"
            placeholder="+ Aggiungi..." data-cat="${esc(catName)}" data-tid="${esc(tripId)}">
          <button class="add-go" data-a="add-item" data-cat="${esc(catName)}" data-tid="${esc(tripId)}">+</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function refreshCats(tripId) {
  const wrap = document.getElementById('cats-wrap');
  if (!wrap) return;
  // Save focused category before re-render
  const focCat = document.activeElement?.classList.contains('add-inp')
    ? document.activeElement.dataset.cat : null;
  wrap.innerHTML = catsHTML(tripId);
  // Restore focus only (not value — placeholder should be clean after add)
  if (focCat) {
    const el = document.querySelector(`.add-inp[data-cat="${CSS.escape(focCat)}"]`);
    if (el) el.focus();
  }
}

function render() {

  else if (S.view==='trip')        content = tripHTML(S.tripId);
  else if (S.view==='presets')     content = presetsHTML();
  else if (S.view==='editPreset')  content = editPresetHTML(S.editPresetId);

  document.getElementById('app').innerHTML =
    `<div class="scroll-area">${content}</div>${bottomNavHTML()}${modalHTML()}`;

  if (S.showModal === 'new' || S.showModal === true) {
    document.getElementById('trip-name-inp')?.focus();
  }
}

// ═══════════════════════════════════════════
// EVENTS — CLICK
// ═══════════════════════════════════════════
document.addEventListener('click', e => {
  const el = e.target.closest('[data-a]');
  if (!el) return;
  const a = el.dataset.a;
  if (a==='noop') return;

  // Nav
  if (a==='go-home-nav') { goHome(); return; }
  if (a==='go-home')     { goHome(); return; }
  if (a==='go-presets')  { S.view='presets'; S.editState=null; render(); return; }

  // Modal
  if (a==='open-modal')  { S.showModal=true; S.selPresetId=Object.keys(S.presets)[0]||''; render(); return; }
  if (a==='close-modal') { S.showModal=false; render(); return; }

  // Trips
  if (a==='open-trip') {
    S.tripId = el.dataset.tid;
    S.tripItemsSnapshot = itemSnapshot(S.trips[S.tripId]);
    S.view = 'trip';
    render(); return;
  }
  if (a==='del-trip') { e.stopPropagation(); deleteTrip(el.dataset.tid); return; }
  if (a==='dup-trip') { e.stopPropagation(); duplicateTrip(el.dataset.tid); return; }

  // Items
  if (a==='toggle-item') {
    const row = el.closest('[data-iid]') || el;
    toggleItem(row.dataset.tid || S.tripId, row.dataset.iid);
    return;
  }
  if (a==='del-item') {
    e.stopPropagation();
    deleteItem(el.dataset.tid, el.dataset.iid);
    return;
  }

  // Categories
  if (a==='toggle-cat') {
    const cat = el.dataset.cat;
    S.collapsed[cat] = !S.collapsed[cat];
    refreshCats(S.tripId);
    return;
  }

  // Add item button
  if (a==='add-item') {
    const inp = document.querySelector(`.add-inp[data-cat="${CSS.escape(el.dataset.cat)}"]`);
    const val = inp?.value.trim();
    if (val && inp) {
      inp.value = ''; // clear BEFORE addItem so refreshCats sees empty value
      el.classList.remove('vis');
      addItem(el.dataset.tid, el.dataset.cat, val);
    }
    return;
  }

  // Edit trip name
  if (a==='toggle-edit-name') {
    const wrap = document.getElementById('trip-name-wrap');
    if (!wrap) return;
    const editing = wrap.classList.toggle('editing-name');
    if (editing) {
      const inp = document.getElementById('trip-name-inp-inline');
      inp?.focus(); inp?.select();
    } else {
      const inp = document.getElementById('trip-name-inp-inline');
      if (inp) saveTripName(S.tripId, inp.value);
    }
    return;
  }

  // New trip confirm
  if (a==='sel-preset') {
    S.selPresetId = el.dataset.pid;
    document.querySelectorAll('.preset-card').forEach(c => c.classList.toggle('sel', c.dataset.pid===S.selPresetId));
    return;
  }
  if (a==='confirm-trip') {
    const name = document.getElementById('trip-name-inp')?.value.trim();
    const date = document.getElementById('trip-date-inp')?.value || '';
    if (name && S.selPresetId) createTrip(name, S.selPresetId, date);
    return;
  }

  // Update preset dialog
  if (a==='update-preset-yes') { applyPresetUpdate(); return; }
  if (a==='update-preset-no')  { finalizeGoHome(); return; }

  // Edit preset
  if (a==='edit-preset')   { enterEditPreset(el.dataset.pid); return; }
  if (a==='add-edit-item') { addEditItem(+el.dataset.ci); return; }
  if (a==='rm-edit-item')  { removeEditItem(+el.dataset.ci, +el.dataset.ii); return; }
  if (a==='add-edit-cat')  { addEditCat(); return; }
  if (a==='rm-edit-cat')   { removeEditCat(+el.dataset.ci); return; }
  if (a==='save-preset')   { savePreset(); return; }
});

// ═══════════════════════════════════════════
// EVENTS — INPUT (live feedback)
// ═══════════════════════════════════════════
document.addEventListener('input', e => {
  if (e.target.classList.contains('add-inp')) {
    const btn = e.target.nextElementSibling;
    btn?.classList.toggle('vis', e.target.value.trim().length > 0);
  }
  if (e.target.id === 'trip-name-inp') {
    const btn = document.getElementById('confirm-btn');
    btn?.classList.toggle('rdy', e.target.value.trim().length > 0);
  }
});

// ═══════════════════════════════════════════
// EVENTS — KEYDOWN
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  const t = e.target;

  // Add item in trip: Enter adds item, clears input (placeholder reappears naturally)
  if (t.classList.contains('add-inp') && e.key === 'Enter') {
    const val = t.value.trim();
    if (val) {
      t.value = ''; // clear BEFORE addItem
      t.nextElementSibling?.classList.remove('vis');
      addItem(t.dataset.tid, t.dataset.cat, val);
    }
    return;
  }

  // Edit preset items: Enter/Next moves to next input or adds new item
  if (t.classList.contains('ep-item-inp') && (e.key==='Enter'||e.key==='Next')) {
    e.preventDefault();
    // Find all ep-item-inp inputs in order
    const all = [...document.querySelectorAll('.ep-item-inp')];
    const idx = all.indexOf(t);
    if (idx >= 0 && idx < all.length - 1) {
      all[idx+1].focus(); all[idx+1].select();
    } else {
      // Last input — click the "add" button of this category
      const ci = +t.dataset.ci;
      addEditItem(ci);
    }
    return;
  }

  // ep-name-inp: enter → focus first item input
  if (t.id === 'ep-name-inp' && e.key === 'Enter') {
    e.preventDefault();
    document.querySelector('.ep-item-inp')?.focus();
    return;
  }

  // New cat input
  if (t.id === 'new-cat-inp' && e.key === 'Enter') { addEditCat(); return; }

  // Modal trip name
  if (t.id === 'trip-name-inp' && e.key === 'Enter') {
    document.getElementById('trip-date-inp')?.focus(); return;
  }

  // Inline trip name
  if (t.id === 'trip-name-inp-inline' && e.key === 'Enter') {
    saveTripName(S.tripId, t.value);
    document.getElementById('trip-name-wrap')?.classList.remove('editing-name');
    return;
  }
});

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations()
    .then(regs => Promise.all(regs.map(r=>r.unregister())))
    .then(() => { caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))); init(); });
} else {
  init();
}
</script>
</body>
</html>
